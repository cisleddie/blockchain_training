<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Crypto Real-time Dashboard</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f0f2f5; }
        table { border-collapse: collapse; width: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #007bff; color: white; }
        .price { font-weight: bold; color: #007bff; }
        #status { margin-top: 20px; font-size: 0.9em; color: #666; }
        /* 갱신 효과 */
        @keyframes highlight { 0% { background: #fff9c4; } 100% { background: white; } }
        .updated { animation: highlight 1s ease-out; }
    </style>
</head>
<body>

    <h2>Real-time Price (30 sec)</h2>
    
    <table>
        <thead>
            <tr>
                <th>Coin</th>
                <th>USD</th>
                <th>KRW</th>
            </tr>
        </thead>
        <tbody>
            <tr id="btc">
                <td>Bitcoin</td>
                <td class="usd">-</td>
                <td class="krw">-</td>
            </tr>
            <tr id="eth">
                <td>Ethereum</td>
                <td class="usd">-</td>
                <td class="krw">-</td>
            </tr>
        </tbody>
    </table>

    <div id="status">데이터 연결 중...</div>

    <script>
        const API_URL = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,krw';
        const PROXY = 'https://corsproxy.io/?';

        async function getPrice() {
            const statusTag = document.getElementById('status');
            try {
                // 429 에러 방지를 위해 요청 주소에 타임스탬프를 섞어 캐시를 방지
                const finalUrl = `${PROXY}${encodeURIComponent(API_URL)}&t=${Date.now()}`;
                const response = await fetch(finalUrl);

                if (response.status === 429) {
                    statusTag.innerText = "⚠️ 요청이 너무 많습니다. 잠시 대기 중...";
                    return;
                }

                const data = await response.json();

                updateUI('btc', data.bitcoin);
                updateUI('eth', data.ethereum);
                
                statusTag.innerText = `마지막 갱신: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                statusTag.innerText = "❌ 데이터 호출 오류";
            }
        }

        function updateUI(id, coin) {
            const el = document.getElementById(id);
            el.querySelector('.usd').innerText = `$ ${coin.usd.toLocaleString()}`;
            el.querySelector('.krw').innerText = `₩ ${coin.krw.toLocaleString()}`;
            
            // 반짝임 효과 추가
            el.classList.remove('updated');
            void el.offsetWidth;
            el.classList.add('updated');
        }

        // 초기 실행
        getPrice();
        // 429 에러 방지를 위해 30초 간격으로 설정 (과제 권장)
        setInterval(getPrice, 30000);
    </script>
</body>
</html>
